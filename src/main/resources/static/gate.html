<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR LC Gate Monitoring</title>
    <link rel="stylesheet" href="allgates.css">
</head>
<body>

    <!-- UNIFIED HEADER (Text Only) -->
    <div class="header">
        <h1>NR LC Gate Monitoring</h1>
    </div>

    <!-- NEW ACTION BAR (Sub-Nav using newnavbarallpage CSS) -->
    <div class="newnavbarallpage">
        <!-- Left Side: Back & Home Group -->
        <div class="nav-group">
            <a href="allgates.html" class="nav-btn">← Back</a>
            <a href="index.html" class="nav-btn">Home</a>
        </div>
        
        <!-- Right Side: Logout -->
        <div class="nav-group">
            <form action="/logout" method="POST" style="margin: 0;">
                <button type="submit" class="nav-btn nav-btn-red">Logout</button>
            </form>
        </div>
    </div>

    <!-- Container with reduced top margin to fit closely under the navbar -->
    <div class="container" style="margin-top: 20px;">
        
        <!-- Modified title to reduce bottom margin so the subtitle tucks nicely underneath -->
        <h2 class="section-title" id="dynamicTitle" style="margin-bottom: 5px;">Select Option</h2>
        
        <!-- NEW: Subtitle element aligned with the title text -->
        <p id="stationSubtitle" style="font-size: 16px; font-weight: 500; color: #64748b; margin: 0 0 30px 14px;"></p>
        
        <!-- The rest of your grid stays exactly the same -->
        <div class="gates-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); max-width: 700px; margin: 0 auto;">
       
            <a href="#" id="logsBtn" class="gate-card">
                Gate Logs
            </a>

            <a href="#" id="insightsBtn" class="gate-card">
                Gate Insights
            </a>
            
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gateId = urlParams.get('id');

        // NEW LOGIC: Determine the station name based on the Gate ID
        let stationName = "";
        if (gateId === '111' || gateId === '114' || gateId === '115') {
            stationName = "Gauriganj";
        } else if (gateId === '193' || gateId === '194') {
            stationName = "Mohanlalganj";
        }

        if (gateId) {
            // Update the main title
            document.getElementById('dynamicTitle').innerText = 'Dashboard: LC Gate  ' + gateId;
            
            // Inject the station name into the subtitle tag
            if (stationName) {
                document.getElementById('stationSubtitle').innerText = 'Station: ' + stationName;
            }
            
            // Update the button links
            document.getElementById('logsBtn').href = 'gatelog.html?id=' + gateId;
            document.getElementById('insightsBtn').href = 'gateinsight.html?id=' + gateId;
        } else {
            document.getElementById('dynamicTitle').innerText = 'Error: No Gate Selected';
        }
    </script>
</body>
</html>
