<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Crossing Management - Gate Logs</title>
    <link rel="stylesheet" href="allgates.css">
</head>
<body>

    <div class="header">
        <h1>Live LC Gate Monitoring</h1>
        <a href="index.html" class="header-home-link">Home</a>
    </div>

    <div class="container">
        
        <!-- Back button pointing to the specific Gate dashboard -->
        <div style="display: flex; justify-content: flex-end; margin-bottom: 5px;">
            <a href="gate.html" id="backToGateBtn" class="secondary-back-btn">← Back</a>
        </div>

        <h2 class="section-title" id="dynamicTitle">Gate Logs</h2>
        
        <!-- Enterprise Table Layout -->
        <div class="table-wrapper">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Duration</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <!-- JavaScript will inject the 1000 logs here -->
                    <tr><td colspan="4" style="text-align: center; padding: 20px;">Loading logs...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Show More Button (Centered) -->
        <div style="text-align: center; margin-top: 20px;">
            <button id="showMoreBtn" class="btn-action" style="display: none; width: auto; padding: 10px 30px; margin: 0 auto; border: none; cursor: pointer;">
                Load More Logs
            </button>
        </div>

    </div>

    <!-- External JavaScript File -->
    <script src="gatelog.js"></script>
</body>
</html>
